{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Scoops</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        :root {
            --bg-color: #fff6f8; /* Very light pink background */
            --text-dark: #3a2e2e;
            --accent-pink: #f77ca0;
            --btn-color: #8c6a6e;
        }

        body {
            margin: 0;
            padding: 0;
            padding-top: 80px;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            box-sizing: border-box; /* Prevent height overflow */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* No scroll */
        }

        /* Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 3rem;
            background: transparent;
            box-sizing: border-box;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-pink);
            font-style: italic;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .login-btn {
            background: transparent;
            color: var(--accent-pink);
            border: 2px solid var(--accent-pink);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: var(--accent-pink);
            color: white;
        }

        /* Hero Section */
        .hero-container {
            flex: 1;
            padding: 0 1.5rem 2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .hero-card {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            background-image: url("{% static 'shop/home_bg.png' %}");
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 4rem;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* Add a subtle overlay so text is readable if image is bright */
        .hero-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 246, 248, 0.9) 0%, rgba(255, 246, 248, 0.3) 50%, transparent 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 450px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #2b2b2b;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: #555;
        }

        .explore-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
            display: inline-block;
        }

        .explore-btn:hover {
            background-color: #7a5c60;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <svg width="42" height="42" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="margin-right: 12px; margin-top: -5px;">
                <!-- Cone -->
                <path d="M7 12L12 21L17 12" fill="#fff0f5" stroke="#f77ca0" stroke-width="2" stroke-linejoin="round"/>
                <!-- Scoop -->
                <path d="M17 12C17 12 18 11.5 18 10C18 7.5 16.5 5 12 5C7.5 5 6 7.5 6 10C6 11.5 7 12 7 12H17Z" fill="#ffb6c1" stroke="#f77ca0" stroke-width="2" stroke-linejoin="round"/>
                <!-- Drips -->
                <path d="M8 12V13.5C8 14.3 9 14.3 9 13.5V12" fill="#ffb6c1" stroke="#f77ca0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 12V14.5C14 15.3 15 15.3 15 14.5V12" fill="#ffb6c1" stroke="#f77ca0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Sweet Scoops
        </div>
        <div class="nav-actions">
            <a href="{% url 'login' %}" class="login-btn">Login</a>
        </div>
    </nav>

    <div class="hero-container">
        <div class="hero-card">
            <div class="hero-content">
                <h1 class="hero-title">Taste the Bloom of Summer</h1>
                <p class="hero-subtitle">Delicious ice creams made with love, bringing sweetness and joy to every scoop, inspired by delightful flavours.</p>
                <a href="{% url 'login' %}" class="explore-btn">Explore Flavours</a>
            </div>
        </div>
    </div>

</body>
</html>
